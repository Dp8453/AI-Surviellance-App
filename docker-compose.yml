services:
  mongodb:
    image: mongo:7
    container_name: aisurviellance-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: aisurviellance-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ai-surviellance
      - JWT_SECRET=production_cyber_jwt_token_secret_key_99
      - GEMINI_API_KEY=your_gemini_api_key_here
      - AWS_ACCESS_KEY_ID=your_aws_access_key_id
      - AWS_SECRET_ACCESS_KEY=your_aws_secret_access_key
      - AWS_REGION=us-east-1
      - AWS_S3_BUCKET_NAME=ai-surviellance-vault
      - GOOGLE_MAPS_API_KEY=your_google_maps_api_key
    depends_on:
      - mongodb
    volumes:
      - server_uploads:/app/uploads

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: aisurviellance-client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongodb_data:
  server_uploads:
